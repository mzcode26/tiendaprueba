version: '3.9'
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tienda_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    ports:
      - '3000:3000'
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      - DATABASE_URL
      - JWT_SECRET
      - JWT_REFRESH_SECRET
      - PORT
      - NODE_ENV
  admin-web:
    build:
      context: .
      dockerfile: ./apps/admin-web/Dockerfile
    ports:
      - '5173:5173'
    depends_on:
      - api
    environment:
      VITE_API_BASE_URL: http://localhost:3000/api/v1
volumes:
  postgres-data:
